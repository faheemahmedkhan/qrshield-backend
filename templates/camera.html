<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QR Scanner — QRShield</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Inter','Segoe UI',sans-serif; height:100dvh; }
    #camWrap { position:relative; width:100vw; height:100dvh; }
    #video   { width:100%; height:100%; object-fit:cover; display:block; }
    #overlay { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

    #topBar {
      position:absolute; top:0; left:0; right:0;
      padding:16px 18px 0;
      background:linear-gradient(rgba(0,0,0,0.65), transparent);
      display:flex; align-items:center; gap:10px; z-index:10;
    }
    .logo { color:#3d84ff; font-size:0.95rem; font-weight:800; letter-spacing:0.06em; }
    .live-dot { width:7px; height:7px; background:#ff3b3b; border-radius:50%; animation:blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.15;} }

    #guideLabel {
      position:absolute; z-index:10; left:0; right:0;
      text-align:center; color:rgba(255,255,255,0.82);
      font-size:0.78rem; font-weight:600; letter-spacing:0.04em;
      pointer-events:none;
    }

    #bottomBar {
      position:absolute; bottom:0; left:0; right:0;
      padding:14px 24px 38px;
      background:linear-gradient(transparent, rgba(0,0,0,0.92));
      display:flex; flex-direction:column; align-items:center; gap:10px;
      z-index:10;
    }
    #hint {
      color:#fff; font-size:0.88rem; font-weight:600;
      letter-spacing:0.02em; text-align:center; min-height:1.3em; transition:color 0.3s;
    }
    #hint.detected  { color:#00ff88; }
    #hint.uploading { color:#3d84ff; }
    #hint.error     { color:#ff4757; }
    #progressBar {
      width:60%; height:3px; background:#3d84ff;
      border-radius:2px; transition:width 0.4s ease; display:none;
    }
    #btnRow { display:flex; align-items:center; justify-content:center; gap:20px; width:100%; margin-top:2px; }

    #captureBtn {
      width:68px; height:68px; border-radius:50%; background:#fff;
      border:5px solid rgba(255,255,255,0.35); cursor:pointer;
      transition:transform 0.12s, background 0.2s;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    #captureBtn:active { transform:scale(0.88); background:#ddd; }
    #captureBtn.disabled { opacity:0.4; pointer-events:none; }
    .shutter-inner { width:50px; height:50px; border-radius:50%; background:#fff; border:3px solid #333; }

    #cancelBtn {
      background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.25);
      color:#fff; padding:10px 26px; border-radius:999px;
      font-size:0.85rem; font-weight:600; cursor:pointer; transition:background 0.2s;
    }
    #cancelBtn:hover { background:rgba(255,255,255,0.22); }
  </style>
</head>
<body>
  <div id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="topBar">
      <div class="live-dot"></div>
      <span class="logo">QRShield</span>
    </div>
    <div id="guideLabel">Align QR code inside the square</div>
    <div id="bottomBar">
      <div id="hint">📷 Place QR code in the frame and tap Capture</div>
      <div id="progressBar"></div>
      <div id="btnRow">
        <button id="cancelBtn" onclick="stopAndGo('/')">✕ Cancel</button>
        <button id="captureBtn" title="Capture QR Code">
          <div class="shutter-inner"></div>
        </button>
      </div>
    </div>
  </div>

  <script>
    const video       = document.getElementById('video');
    const overlay     = document.getElementById('overlay');
    const hint        = document.getElementById('hint');
    const progressBar = document.getElementById('progressBar');
    const captureBtn  = document.getElementById('captureBtn');
    const guideLabel  = document.getElementById('guideLabel');
    const ctx         = overlay.getContext('2d', { willReadFrequently: true });

    let stream    = null;
    let scanning  = true;
    let lastFrame = null; // display-space {x0, y0, size}

    function stopAndGo(url) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      window.location.href = url;
    }

    // ── Grayscale + contrast stretch ──────────────────────────────────────
    function toGrayscale(gCtx, w, h) {
      const d = gCtx.getImageData(0, 0, w, h);
      let mn = 255, mx = 0;
      for (let i = 0; i < d.data.length; i += 4) {
        const g = Math.round(0.299*d.data[i] + 0.587*d.data[i+1] + 0.114*d.data[i+2]);
        d.data[i] = d.data[i+1] = d.data[i+2] = g;
        if (g < mn) mn = g; if (g > mx) mx = g;
      }
      const range = mx - mn || 1;
      for (let i = 0; i < d.data.length; i += 4) {
        const s = Math.round((d.data[i] - mn) / range * 255);
        d.data[i] = d.data[i+1] = d.data[i+2] = s;
      }
      gCtx.putImageData(d, 0, 0);
    }

    // ── object-fit:cover transform: display px ↔ video px ─────────────────
    function getCoverTransform() {
      const dw = video.clientWidth,  dh = video.clientHeight;
      const vw = video.videoWidth,   vh = video.videoHeight;
      if (!vw || !vh) return null;
      const scale = Math.max(dw / vw, dh / vh);
      const offX  = (vw * scale - dw) / 2;
      const offY  = (vh * scale - dh) / 2;
      return { scale, offX, offY };
    }

    // Convert display-space rect → video-space rect
    function displayToVideo(dx0, dy0, dsize) {
      const t = getCoverTransform();
      if (!t) return null;
      const vx0 = (dx0  + t.offX) / t.scale;
      const vy0 = (dy0  + t.offY) / t.scale;
      const vs  = dsize / t.scale;
      const vw  = video.videoWidth, vh = video.videoHeight;
      return {
        vx0: Math.round(Math.max(0, vx0)),
        vy0: Math.round(Math.max(0, vy0)),
        vs:  Math.round(Math.min(vs, Math.min(vw - vx0, vh - vy0)))
      };
    }

    // ── Draw TRUE SQUARE frame in display/CSS pixel space ─────────────────
    function drawFrame(state) {
      // Use actual screen dimensions for the canvas — guarantees a true square
      const dw = video.clientWidth  || window.innerWidth;
      const dh = video.clientHeight || window.innerHeight;

      overlay.width  = dw;
      overlay.height = dh;
      ctx.clearRect(0, 0, dw, dh);

      // Square = 80% of the SHORTER screen side → always visually square
      const size = Math.round(Math.min(dw, dh) * 0.80);
      const x0   = Math.round((dw - size) / 2);
      const y0   = Math.round((dh - size) / 2);
      const arm  = Math.round(size * 0.14);

      lastFrame = { x0, y0, size };

      // Move guide label above frame
      guideLabel.style.top = Math.max(54, y0 - 36) + 'px';

      // Dim outside the square
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, dw, dh);
      ctx.clearRect(x0, y0, size, size);

      // Inner tint by state
      if (state === 'detected') {
        ctx.fillStyle = 'rgba(0,255,136,0.18)';
        ctx.fillRect(x0, y0, size, size);
      } else if (state === 'uploading') {
        ctx.fillStyle = 'rgba(61,132,255,0.18)';
        ctx.fillRect(x0, y0, size, size);
      }

      // Corner L-shapes
      const color = state === 'detected' ? '#00ff88' : state === 'uploading' ? '#3d84ff' : '#ffffff';
      ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round';
      [
        [x0,      y0,       1,  1],
        [x0+size, y0,      -1,  1],
        [x0,      y0+size,  1, -1],
        [x0+size, y0+size, -1, -1]
      ].forEach(([x, y, dx, dy]) => {
        ctx.beginPath();
        ctx.moveTo(x + dx*arm, y); ctx.lineTo(x, y); ctx.lineTo(x, y + dy*arm);
        ctx.stroke();
      });

      // Scanning line animation
      if (state === 'scanning') {
        const scanY = y0 + size * ((Date.now() % 2000) / 2000);
        const g = ctx.createLinearGradient(x0, scanY-12, x0, scanY+12);
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.5, 'rgba(61,132,255,0.75)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(x0, scanY-12, size, 24);
      }
    }

    // ── Capture, crop, grayscale and upload ───────────────────────────────
    function processCapture() {
      if (!scanning || !lastFrame) return;
      scanning = false;
      captureBtn.classList.add('disabled');

      const { x0, y0, size } = lastFrame;
      const margin = Math.round(size * 0.03);
      const rect   = displayToVideo(x0 - margin, y0 - margin, size + margin * 2);
      if (!rect || rect.vs < 10) {
        hint.textContent = '❌ Could not map to video frame. Try again.';
        hint.className = 'error';
        scanning = true; captureBtn.classList.remove('disabled');
        return;
      }

      const OUT = 512;
      // Step 1: Crop frame area from live video → 512×512
      const frameCanvas = document.createElement('canvas');
      frameCanvas.width = OUT; frameCanvas.height = OUT;
      const fCtx = frameCanvas.getContext('2d', { willReadFrequently: true });
      fCtx.drawImage(video, rect.vx0, rect.vy0, rect.vs, rect.vs, 0, 0, OUT, OUT);

      // Step 2: Run jsQR for tight QR boundary detection within the crop
      const id = fCtx.getImageData(0, 0, OUT, OUT);
      const qr = jsQR(id.data, OUT, OUT, { inversionAttempts: 'attemptBoth' });

      let finalCanvas;
      if (qr && qr.location) {
        const pts = [qr.location.topLeftCorner, qr.location.topRightCorner,
                     qr.location.bottomRightCorner, qr.location.bottomLeftCorner];
        const pad  = 14;
        const minX = Math.max(0,   Math.min(...pts.map(p => p.x)) - pad);
        const minY = Math.max(0,   Math.min(...pts.map(p => p.y)) - pad);
        const maxX = Math.min(OUT, Math.max(...pts.map(p => p.x)) + pad);
        const maxY = Math.min(OUT, Math.max(...pts.map(p => p.y)) + pad);
        finalCanvas = document.createElement('canvas');
        finalCanvas.width = OUT; finalCanvas.height = OUT;
        finalCanvas.getContext('2d').drawImage(frameCanvas, minX, minY, maxX-minX, maxY-minY, 0, 0, OUT, OUT);
        hint.textContent = '✅ QR boundaries detected — processing…';
        hint.className   = 'detected';
      } else {
        finalCanvas = frameCanvas; // fallback: use full frame square
        hint.textContent = '📐 Using frame area — processing…';
        hint.className   = '';
      }
      drawFrame('detected');

      // Step 3: Grayscale + contrast stretch
      toGrayscale(finalCanvas.getContext('2d'), OUT, OUT);

      // Step 4: Store preview base64 → main page will display it
      sessionStorage.setItem('qrCapturePreview', finalCanvas.toDataURL('image/jpeg', 0.92));

      // Step 5: Upload to /scan
      setTimeout(() => {
        drawFrame('uploading');
        hint.textContent = '⬆ Uploading to server…';
        hint.className   = 'uploading';
        progressBar.style.display = 'block';
        progressBar.style.width   = '30%';
        if (stream) stream.getTracks().forEach(t => t.stop());

        finalCanvas.toBlob(blob => {
          progressBar.style.width = '65%';
          const form = new FormData();
          form.append('file', blob, 'scan.jpg');
          fetch('/scan', { method: 'POST', body: form })
            .then(r => r.json())
            .then(result => {
              progressBar.style.width = '100%';
              sessionStorage.setItem('qrScanResult', JSON.stringify(result));
              setTimeout(() => { window.location.href = '/'; }, 280);
            })
            .catch(err => {
              hint.textContent = '❌ Upload failed: ' + err.message;
              hint.className   = 'error';
              progressBar.style.display = 'none';
              scanning = true;
              captureBtn.classList.remove('disabled');
            });
        }, 'image/jpeg', 0.95);
      }, 350);
    }

    // ── Animation loop (runs in display space) ────────────────────────────
    function loop() {
      drawFrame(scanning ? 'scanning' : 'detected');
      if (scanning) requestAnimationFrame(loop);
    }

    captureBtn.addEventListener('click', processCapture);

    // ── Auto-detect: scan inside frame every 200ms ────────────────────────
    const sc    = document.createElement('canvas');
    const scCtx = sc.getContext('2d', { willReadFrequently: true });
    let autoTimer = null;

    function autoDetect() {
      if (!scanning || !lastFrame) return;
      const rect = displayToVideo(lastFrame.x0, lastFrame.y0, lastFrame.size);
      if (!rect || rect.vs < 10) return;
      const sw = Math.round(rect.vs * 0.5);
      sc.width = sw; sc.height = sw;
      scCtx.drawImage(video, rect.vx0, rect.vy0, rect.vs, rect.vs, 0, 0, sw, sw);
      const id = scCtx.getImageData(0, 0, sw, sw);
      const qr = jsQR(id.data, sw, sw, { inversionAttempts: 'attemptBoth' });
      if (qr) { clearInterval(autoTimer); processCapture(); }
    }

    // ── Start camera ──────────────────────────────────────────────────────
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1920 } }
    }).then(s => {
      stream = s;
      video.srcObject = s;
      video.onloadedmetadata = () => {
        loop();
        autoTimer = setInterval(autoDetect, 200);
      };
    }).catch(() => {
      hint.textContent = '❌ Camera access denied. Please allow camera permission and reload.';
      hint.className   = 'error';
    });
  </script>
</body>
</html>
